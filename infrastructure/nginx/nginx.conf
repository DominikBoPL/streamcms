# Nginx config with RTMP module for live streaming

# Number of worker processes - "auto" = one per CPU core
worker_processes auto;

events {
    worker_connections 1024;
}

# RTMP block - this is added by the nginx-rtmp module
# Standard nginx doesn't have this
rtmp {
    server {
        # Listen for incoming RTMP streams on port 1935
        # OBS will push stream to: rtmp://localhost:1935/live/STREAM_KEY
        listen 1935;

        # Chunk size affects latency vs stability tradeoff
        chunk_size 4096;

        application live {
            # Enable live streaming mode
            live on;

            # Convert incoming RTMP stream to HLS automatically
            hls on;

            # Where to write HLS segment files
            hls_path /tmp/hls;

            # Each HLS segment = 2 seconds of video
            # Lower = less latency, Higher = more stable
            hls_fragment 2s;

            # Playlist keeps last 8 segments = ~16 seconds buffer
            hls_playlist_length 8s;

            # Disable recording to disk (we'll handle this in media-service)
            record off;
        }
    }
}

http {
    server {
        # HTTP server serves HLS files to the video player
        listen 80;

        location /hls {
            # Serve files from the HLS directory
            types {
                application/vnd.apple.mpegurl m3u8;  # HLS playlist
                video/mp2t ts;                         # HLS segments
            }

            root /tmp;

            # CORS headers - allow frontend (different port) to access
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }

        # Simple status endpoint to check if nginx is running
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }
    }
}
